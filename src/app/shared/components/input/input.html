<div class="mb-3">
  <label class="form-label">
    {{ label }}
    <span *ngIf="required" class="text-danger">*</span>
  </label>
  <div class="input-group" *ngIf="icon">
    <span class="input-group-text">
      <i [class]="icon"></i>
    </span>
    <input [type]="type" 
           class="form-control" 
           [class.is-invalid]="error"
           [placeholder]="placeholder"
           [disabled]="disabled"
           [value]="value"
           (input)="onInput($event)"
           (blur)="onTouched()">
  </div>
  <input *ngIf="!icon" 
         [type]="type" 
         class="form-control" 
         [class.is-invalid]="error"
         [placeholder]="placeholder"
         [disabled]="disabled"
         [value]="value"
         (input)="onInput($event)"
         (blur)="onTouched()">
  <div *ngIf="error" class="invalid-feedback d-block">
    {{ error }}
  </div>
</div>
