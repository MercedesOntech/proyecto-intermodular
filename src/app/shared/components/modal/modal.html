<div class="modal fade" [id]="id" #modalElement tabindex="-1" aria-hidden="true">
  <div class="modal-dialog" [class]="getSizeClass()">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ title }}</h5>
        <button type="button" class="btn-close" (click)="onCancel()" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <ng-content></ng-content>
      </div>
      <div class="modal-footer" *ngIf="showFooter">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">{{ cancelText }}</button>
        <button type="button" class="btn btn-primary" [disabled]="disableConfirm" (click)="onConfirm()">{{ confirmText }}</button>
      </div>
    </div>
  </div>
</div>
