<div *ngIf="fullScreen" class="spinner-overlay">
  <div class="spinner-container text-center">
    <div class="spinner-border" [class]="getSizeClass()" [style.width]="getSpinnerSize()" [style.height]="getSpinnerSize()" role="status">
      <span class="visually-hidden">{{ text }}</span>
    </div>
    <p class="mt-3 text-muted">{{ text }}</p>
  </div>
</div>

<div *ngIf="!fullScreen" class="d-inline-block">
  <div class="spinner-border" [class]="getSizeClass()" [style.width]="getSpinnerSize()" [style.height]="getSpinnerSize()" role="status">
    <span class="visually-hidden">{{ text }}</span>
  </div>
</div>
