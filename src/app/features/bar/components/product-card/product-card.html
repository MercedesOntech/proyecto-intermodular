<div class="product-card">
  <div class="product-image">
    <img [src]="product.imageUrl || 'assets/images/default-product.jpg'" 
         [alt]="product.name"
         (error)="$event.target.src='assets/images/default-product.jpg'">
    <div class="product-badge" *ngIf="product.stock === 0">
      <span class="badge bg-danger">Agotado</span>
    </div>
  </div>
  
  <div class="product-info">
    <h5 class="product-name">{{ product.name }}</h5>
    <p class="product-price">{{ product.price | currencyFormat:'EUR' }}</p>
    
    <div class="quantity-control" *ngIf="product.stock !== 0">
      <button class="btn-quantity" (click)="decrement()" [disabled]="quantity === 0">
        <i class="bi bi-dash-lg"></i>
      </button>
      <span class="quantity-value">{{ quantity }}</span>
      <button class="btn-quantity" (click)="increment()">
        <i class="bi bi-plus-lg"></i>
      </button>
    </div>
    
    <div class="out-of-stock" *ngIf="product.stock === 0">
      <span class="text-danger">No disponible</span>
    </div>
  </div>
</div>
