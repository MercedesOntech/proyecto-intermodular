<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Crear Nuevo Usuario</h4>
        </div>
        <div class="card-body">
          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>
          
          <div *ngIf="successMessage" class="alert alert-success">
            {{ successMessage }}
          </div>
          
          <form (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Nombre *</label>
                <input type="text" class="form-control" [(ngModel)]="userData.name" name="name" required>
              </div>
              
              <div class="col-md-6 mb-3">
                <label class="form-label">Apellidos *</label>
                <input type="text" class="form-control" [(ngModel)]="userData.lastName" name="lastName" required>
              </div>
            </div>
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Fecha de Nacimiento *</label>
                <input type="date" class="form-control" [(ngModel)]="userData.birthDate" name="birthDate" required>
              </div>
              
              <div class="col-md-6 mb-3">
                <label class="form-label">Nombre de Usuario *</label>
                <input type="text" class="form-control" [(ngModel)]="userData.userName" name="userName" required>
              </div>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Correo Electrónico *</label>
              <input type="email" class="form-control" [(ngModel)]="userData.email" name="email" required>
            </div>
            
            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label">Prefijo</label>
                <select class="form-select" [(ngModel)]="userData.phonePrefix" name="phonePrefix">
                  <option *ngFor="let prefix of phonePrefixes" [value]="prefix">{{ prefix }}</option>
                </select>
              </div>
              
              <div class="col-md-8 mb-3">
                <label class="form-label">Teléfono *</label>
                <input type="tel" class="form-control" [(ngModel)]="userData.phone" name="phone" required>
              </div>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Tipo de Usuario *</label>
              <select class="form-select" [(ngModel)]="userData.userType" name="userType">
                <option *ngFor="let type of userTypes" [value]="type.value">{{ type.label }}</option>
              </select>
            </div>
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Contraseña *</label>
                <input type="password" class="form-control" [(ngModel)]="userData.password" name="password" required>
              </div>
              
              <div class="col-md-6 mb-3">
                <label class="form-label">Confirmar Contraseña *</label>
                <input type="password" class="form-control" [(ngModel)]="userData.confirmPassword" name="confirmPassword" required>
              </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
              Crear Usuario
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
