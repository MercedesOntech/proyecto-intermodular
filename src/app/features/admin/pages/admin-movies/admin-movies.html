<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Administración de Películas</h1>
    <button class="btn btn-primary" (click)="openCreateForm()">
      <i class="bi bi-plus-circle me-2"></i>
      Nueva Película
    </button>
  </div>

  <!-- Tabla de películas -->
  <div *ngIf="isLoading" class="text-center">
    <app-spinner></app-spinner>
  </div>

  <div *ngIf="!isLoading" class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Imagen</th>
          <th>Nombre</th>
          <th>Duración</th>
          <th>Tipo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let movie of movies">
          <td>{{ movie.id }}</td>
          <td>
            <img [src]="movie.imageUrl || 'assets/images/default-film.jpg'" 
                 class="movie-thumbnail" 
                 [alt]="movie.name">
          </td>
          <td>{{ movie.name }}</td>
          <td>{{ formatDuration(movie.duration) }}</td>
          <td>
            <span class="badge" [class.bg-primary]="movie.film_type_id === 1" 
                  [class.bg-success]="movie.film_type_id === 2">
              {{ movie.filmType?.type || '2D' }}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-warning me-2" (click)="editMovie(movie)">
              <i class="bi bi-pencil"></i> Editar
            </button>
            <button class="btn btn-sm btn-danger" (click)="deleteMovie(movie.id)">
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Formulario de película (modal) -->
  <div class="modal-overlay" *ngIf="showForm">
    <div class="modal-container">
      <div class="modal-header">
        <h3>{{ editingMovie ? 'Editar Película' : 'Nueva Película' }}</h3>
        <button class="btn-close" (click)="cancelForm()">×</button>
      </div>
      <div class="modal-body">
        <form>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Nombre *</label>
              <input type="text" class="form-control" [(ngModel)]="formData.name" name="name">
            </div>
            
            <div class="col-md-6 mb-3">
              <label class="form-label">Duración (minutos) *</label>
              <input type="number" class="form-control" [(ngModel)]="formData.duration" name="duration">
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" rows="3" [(ngModel)]="formData.description" name="description"></textarea>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Fecha de Estreno</label>
              <input type="date" class="form-control" [(ngModel)]="formData.releaseDate" name="releaseDate">
            </div>
            
            <div class="col-md-6 mb-3">
              <label class="form-label">Tipo de Película</label>
              <select class="form-select" [(ngModel)]="formData.film_type_id" name="film_type_id">
                <option [value]="1">2D</option>
                <option [value]="2">3D</option>
              </select>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">URL de Imagen</label>
            <input type="text" class="form-control" [(ngModel)]="formData.imageUrl" name="imageUrl">
          </div>
          
          <div class="mb-3">
            <label class="form-label">URL del Trailer</label>
            <input type="text" class="form-control" [(ngModel)]="formData.trailerUrl" name="trailerUrl">
          </div>
          
          <div class="mb-3">
            <label class="form-label">Géneros</label>
            <div class="checkbox-group">
              <label *ngFor="let genre of genres" class="checkbox-label">
                <input type="checkbox" 
                       [checked]="isSelected(formData.genre_ids, genre.id)"
                       (change)="toggleSelection(formData.genre_ids, genre.id)">
                {{ genre.type }}
              </label>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Directores</label>
            <div class="checkbox-group">
              <label *ngFor="let director of directors" class="checkbox-label">
                <input type="checkbox" 
                       [checked]="isSelected(formData.director_ids, director.id)"
                       (change)="toggleSelection(formData.director_ids, director.id)">
                {{ director.name }}
              </label>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Actores</label>
            <div class="checkbox-group">
              <label *ngFor="let actor of actors" class="checkbox-label">
                <input type="checkbox" 
                       [checked]="isSelected(formData.actor_ids, actor.id)"
                       (change)="toggleSelection(formData.actor_ids, actor.id)">
                {{ actor.name }}
              </label>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Horarios</label>
            <div class="checkbox-group">
              <label *ngFor="let schedule of schedules" class="checkbox-label">
                <input type="checkbox" 
                       [checked]="isSelected(formData.schedule_ids, schedule.id)"
                       (change)="toggleSelection(formData.schedule_ids, schedule.id)">
                {{ schedule.timeSchedule }}
              </label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="cancelForm()">Cancelar</button>
        <button class="btn btn-primary" (click)="saveMovie()">Guardar</button>
      </div>
    </div>
  </div>
</div>
