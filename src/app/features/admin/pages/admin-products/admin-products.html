<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Administración de Productos</h1>
    <button class="btn btn-primary" (click)="openCreateForm()">
      <i class="bi bi-plus-circle me-2"></i>
      Nuevo Producto
    </button>
  </div>

  <!-- Tabla de productos -->
  <div *ngIf="isLoading" class="text-center">
    <app-spinner></app-spinner>
  </div>

  <div *ngIf="!isLoading" class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Imagen</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td>{{ product.id }}</td>
          <td>
            <img [src]="product.imageUrl || 'assets/images/default-product.jpg'" 
                 class="product-thumbnail" 
                 [alt]="product.name">
          </td>
          <td>{{ product.name }}</td>
          <td>{{ product.price | currencyFormat:'EUR' }}</td>
          <td>
            <span class="badge" [class.bg-success]="product.stock && product.stock > 0" 
                  [class.bg-danger]="!product.stock || product.stock === 0">
              {{ product.stock || 0 }} unidades
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-warning me-2" (click)="editProduct(product)">
              <i class="bi bi-pencil"></i> Editar
            </button>
            <button class="btn btn-sm btn-danger" (click)="deleteProduct(product.id)">
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Formulario de producto (modal) -->
  <div class="modal-overlay" *ngIf="showForm">
    <div class="modal-container">
      <div class="modal-header">
        <h3>{{ editingProduct ? 'Editar Producto' : 'Nuevo Producto' }}</h3>
        <button class="btn-close" (click)="cancelForm()">×</button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Nombre *</label>
            <input type="text" class="form-control" [(ngModel)]="formData.name" name="name">
          </div>
          
          <div class="mb-3">
            <label class="form-label">Precio (€) *</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="formData.price" name="price">
          </div>
          
          <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" class="form-control" [(ngModel)]="formData.stock" name="stock">
          </div>
          
          <div class="mb-3">
            <label class="form-label">URL de la Imagen *</label>
            <input type="text" class="form-control" [(ngModel)]="formData.imageUrl" name="imageUrl">
          </div>
          
          <div *ngIf="formData.imageUrl" class="mb-3 text-center">
            <img [src]="formData.imageUrl" class="preview-image" alt="Preview">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="cancelForm()">Cancelar</button>
        <button class="btn btn-primary" (click)="saveProduct()">Guardar</button>
      </div>
    </div>
  </div>
</div>
